<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{book.title}} — Book Details</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --text-main: #333333;
            --text-muted: #7f8c8d;
            --bg-body: #f8f9fa;
            --bg-card: #ffffff;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        .book-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            padding: 2rem;
        }

        @media (min-width: 768px) {
            .book-layout {
                grid-template-columns: 300px 1fr;
                gap: 3rem;
                padding: 3rem;
            }
        }

        /* Cover Image Styling */
        .book-cover-wrapper {
            display: flex;
            justify-center: center;
            align-items: flex-start;
        }

        .book-cover {
            width: 100%;
            max-width: 300px;
            height: auto;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            background-color: #eaeaea; /* Fallback background */
        }

        /* Content Styling */
        .book-details {
            display: flex;
            flex-direction: column;
        }

        .book-title {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--primary-color);
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }

        .book-author {
            font-size: 1.25rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 1.5rem;
        }

        .book-price {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
        }

        .divider {
            height: 1px;
            background-color: var(--border-color);
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .book-summary {
            font-size: 1.05rem;
            color: var(--text-main);
            margin-bottom: 2rem;
            white-space: pre-line; /* Preserves line breaks from database */
        }

        .book-meta {
            margin-top: auto;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* Action Button Example */
        .btn-purchase {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            text-decoration: none;
            transition: background-color 0.2s;
            margin-top: 1rem;
            cursor: pointer;
            border: none;
        }

        .btn-purchase:hover {
            background-color: #1a252f;
        }
    </style>
</head>
<body>

    <main class="container">
        <div class="book-layout">
            
            <!-- Left Column: Cover -->
            <div class="book-cover-wrapper">
                {% if book.photo.url %}
                    <img class="book-cover" src="{{book.photo.url}}" alt="Cover of {{book.title}}">
                {% else %}
                    <!-- Placeholder if no image exists -->
                    <div class="book-cover" style="display: flex; align-items: center; justify-content: center; background: #e2e8f0; color: #a0aec0; text-align: center; padding: 1rem;">
                        No Cover Available
                    </div>
                {% endif %}
            </div>

            <!-- Right Column: Details -->
            <div class="book-details">
                <h1 class="book-title">{{book.title}}</h1>
                <div class="book-author">by {{book.author}}</div>
                
                <div class="book-price">
                    <!-- Note: You can add currency formatting here, e.g., ${{book.price}} -->
                    {{book.price}}
                </div>

                <div class="divider"></div>

                <h3 class="section-title">Synopsis</h3>
                <p class="book-summary">{{book.summary}}</p>

                <button class="btn-purchase">Add to Cart</button>

                <div class="book-meta">
                    <span><strong>Published/Added:</strong> {{book.created_at}}</span>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
