<form method="POST" action="/new-book/" enctype="multipart/form-data" class="book-form">
    {% csrf_token %}
    
    <h2 class="form-title">Yangi Kitob Qo'shish</h2>
    
    <div class="form-group">
        <label for="title">Kitob Nomi</label>
        <input id="title" name="title" type="text" placeholder="Masalan: O'tkan Kunlar" required>
    </div>

    <div class="form-group">
        <label for="author">Muallif</label>
        <input id="author" type="text" name="author" placeholder="Masalan: Abdulla Qodiriy" required>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="price">Narxi</label>
            <input id="price" type="number" step="0.01" name="price" placeholder="Masalan: 45000" required>
        </div>

        <div class="form-group">
            <label for="photo" class="file-label">Kitob Muqovasi</label>
            <input id="photo" type="file" name="photo" accept="image/*">
        </div>
    </div>

    <div class="form-group">
        <label for="summary">Tavsif (Summary)</label>
        <textarea id="summary" name="summary" rows="5" placeholder="Kitob haqida qisqacha ma'lumot..." required></textarea>
    </div>

    <button type="submit" class="btn-submit">Saqlash</button>
</form>

<style>
    :root {
        --primary: #2c3e50;
        --primary-hover: #1a252f;
        --border: #cbd5e1;
        --text: #334155;
        --bg-input: #f8fafc;
    }

    .book-form {
        max-width: 600px;
        margin: 2rem auto;
        padding: 2.5rem;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: var(--text);
    }

    .form-title {
        margin-bottom: 2rem;
        color: var(--primary);
        font-size: 1.75rem;
        font-weight: 700;
        text-align: center;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 1.25rem;
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
    }

    @media (min-width: 480px) {
        .form-row {
            grid-template-columns: 1fr 1fr;
        }
    }

    label {
        font-size: 0.9rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: var(--primary);
    }

    input[type="text"],
    input[type="number"],
    textarea {
        width: 100%;
        padding: 0.75rem 1rem;
        font-size: 1rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        background-color: var(--bg-input);
        color: var(--text);
        transition: all 0.2s ease;
        box-sizing: border-box;
    }

    input:focus,
    textarea:focus {
        outline: none;
        border-color: var(--primary);
        background-color: #fff;
        box-shadow: 0 0 0 3px rgba(44, 62, 80, 0.1);
    }

    /* Customizing file input a bit */
    input[type="file"] {
        padding: 0.5rem 0;
        font-size: 0.9rem;
    }

    textarea {
        resize: vertical;
    }

    .btn-submit {
        width: 100%;
        padding: 0.85rem;
        margin-top: 1rem;
        background-color: var(--primary);
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s ease;
    }

    .btn-submit:hover {
        background-color: var(--primary-hover);
    }
</style>
